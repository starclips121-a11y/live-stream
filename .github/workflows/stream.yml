name: 24/7 Live Stream
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Video Link'
        required: true

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
    - name: Install FFmpeg
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Start Streaming
      run: |
        ffmpeg -re -stream_loop -1 -i "${{ github.event.inputs.video_url }}" \
        -vcodec libx264 -pix_fmt yuv420p -maxrate 2048k -bufsize 2048k \
        -acodec aac -b:a 128k -ar 44100 \
        -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
